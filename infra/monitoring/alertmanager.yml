# ============================================================
# NexoraField AI — Alertmanager Configuration (Fase 9)
# ============================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "alertas@nexorafield.com.br"
  smtp_require_tls: true

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  group_by: ["alertname", "cluster", "service"]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 12h
  receiver: "nexora-ops-team"

  routes:
    - match:
        severity: critical
      receiver: "nexora-pagerduty"
      continue: true

    - match:
        severity: warning
      receiver: "nexora-ops-team"

receivers:
  - name: "nexora-ops-team"
    email_configs:
      - to: "ops@nexorafield.com.br"
        send_resolved: true
        html: '{{ template "email.nexora.html" . }}'

  - name: "nexora-pagerduty"
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_KEY}"
        send_resolved: true
        description: '{{ template "pagerduty.default.description" . }}'

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "cluster", "service"]
