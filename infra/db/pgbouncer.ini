# ============================================================
# NexoraField AI — PgBouncer Configuration (Fase 5)
# Connection Pooling para PostgreSQL HA
# ============================================================

[databases]
nexorafield = host=nexorafield-postgres-prod port=5432 dbname=nexorafield pool_size=25

[pgbouncer]
logfile         = /var/log/pgbouncer/pgbouncer.log
pidfile         = /var/run/pgbouncer/pgbouncer.pid
listen_addr     = 0.0.0.0
listen_port     = 5432
auth_type       = scram-sha-256
auth_file       = /etc/pgbouncer/userlist.txt
admin_users     = nexora_admin
stats_users     = nexora_stats

# Pool settings
pool_mode       = transaction
max_client_conn = 500
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100
max_user_connections = 0

# Timeouts
server_lifetime        = 3600
server_idle_timeout    = 600
client_idle_timeout    = 0
connect_timeout        = 15
query_timeout          = 0
client_login_timeout   = 60

# TLS
server_tls_sslmode  = require
server_tls_ca_file  = /etc/pgbouncer/ca.crt

# Logging
log_connections    = 1
log_disconnections = 1
log_pooler_errors  = 1
stats_period       = 60

# Tuning
ignore_startup_parameters = extra_float_digits
application_name_add_host = 1
