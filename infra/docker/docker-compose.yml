version: "3.9"

# ============================================================
# NexoraField AI — Docker Compose (Fase 2 — Containerização)
# Todos os serviços: API, Workers, Gateway, DB, Cache, Proxy
# ============================================================

x-common-env: &common-env
  NODE_ENV: production
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  JWT_SECRET: ${JWT_SECRET}
  DATABASE_URL: ${DATABASE_URL:-postgresql://nexora:${POSTGRES_PASSWORD}@postgres:5432/nexorafield}
  REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}

x-api-base: &api-base
  image: nexorafield/api:${IMAGE_TAG:-latest}
  build:
    context: ../..
    dockerfile: infra/docker/Dockerfile
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - nexora-net

services:
  # ── API Principal ──────────────────────────────────────────
  api:
    <<: *api-base
    container_name: nexora-api
    ports:
      - "5000:5000"
    environment:
      <<: *common-env
      PORT: "5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Worker IA ─────────────────────────────────────────────
  worker-ai:
    <<: *api-base
    container_name: nexora-worker-ai
    command: ["node", "dist/workers/ai.cjs"]
    environment:
      <<: *common-env
      WORKER_TYPE: ai
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ── Worker Financeiro ─────────────────────────────────────
  worker-financial:
    <<: *api-base
    container_name: nexora-worker-financial
    command: ["node", "dist/workers/financial.cjs"]
    environment:
      <<: *common-env
      WORKER_TYPE: financial
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 96M

  # ── Worker CRM ────────────────────────────────────────────
  worker-crm:
    <<: *api-base
    container_name: nexora-worker-crm
    command: ["node", "dist/workers/crm.cjs"]
    environment:
      <<: *common-env
      WORKER_TYPE: crm
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ── Worker Notificações ───────────────────────────────────
  worker-notifications:
    <<: *api-base
    container_name: nexora-worker-notifications
    command: ["node", "dist/workers/notifications.cjs"]
    environment:
      <<: *common-env
      WORKER_TYPE: notifications
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  # ── Scheduler ─────────────────────────────────────────────
  scheduler:
    <<: *api-base
    container_name: nexora-scheduler
    command: ["node", "dist/workers/scheduler.cjs"]
    environment:
      <<: *common-env
      WORKER_TYPE: scheduler
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 48M

  # ── Webhook Dispatcher ────────────────────────────────────
  webhook-dispatcher:
    <<: *api-base
    container_name: nexora-webhook-dispatcher
    command: ["node", "dist/workers/webhooks.cjs"]
    environment:
      <<: *common-env
      WORKER_TYPE: webhooks
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  # ── API Gateway ───────────────────────────────────────────
  gateway:
    <<: *api-base
    container_name: nexora-gateway
    command: ["node", "dist/gateway.cjs"]
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      WORKER_TYPE: gateway
      UPSTREAM_API: http://api:5000
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 80M

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nexora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexorafield
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora -d nexorafield"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - nexora-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # ── PgBouncer (Connection Pool) ───────────────────────────
  pgbouncer:
    image: bitnami/pgbouncer:1.22.0
    container_name: nexora-pgbouncer
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: nexorafield
      POSTGRESQL_USERNAME: nexora
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "500"
      PGBOUNCER_DEFAULT_POOL_SIZE: "25"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:6432:6432"
    networks:
      - nexora-net

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexora-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - nexora-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Nginx (Reverse Proxy) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexora-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - nexora-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prometheus (Monitoramento) ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nexora-prometheus
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - nexora-net

  # ── Grafana (Dashboards) ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nexora-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.nexorafield.com.br"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - nexora-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  nexora-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
