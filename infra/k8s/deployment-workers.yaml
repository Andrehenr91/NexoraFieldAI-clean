# ── API Gateway ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-gateway
  namespace: nexorafield
  labels:
    app: nexora-gateway
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexora-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nexora-gateway
        component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: gateway
          image: gcr.io/nexorafield/api:7.0.0
          command: ["node", "dist/gateway.cjs"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: nexora-config
            - secretRef:
                name: nexora-secrets
          resources:
            requests:
              cpu: "25m"
              memory: "80Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
---
