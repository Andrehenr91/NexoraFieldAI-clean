# ============================================================
# NexoraField AI — Worker Deployments
# Fase 2/3: Containers e Kubernetes para todos os workers
# Worker Financeiro | CRM | Notifications | Scheduler | Gateway
# ============================================================

# ── Worker Financeiro ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-worker-financial
  namespace: nexorafield
  labels:
    app: nexora-worker-financial
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexora-worker-financial
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nexora-worker-financial
        component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: worker-financial
          image: gcr.io/nexorafield/api:7.0.0
          command: ["node", "dist/workers/financial.cjs"]
          envFrom:
            - configMapRef:
                name: nexora-config
            - secretRef:
                name: nexora-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
---
