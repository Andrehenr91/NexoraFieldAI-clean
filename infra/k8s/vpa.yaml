# ============================================================
# NexoraField AI — Vertical Pod Autoscaler (VPA)
# Fase 3: Kubernetes — VPA para ajuste automático de recursos
# ============================================================
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: nexora-api-vpa
  namespace: nexorafield
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexora-api
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: api
        minAllowed:
          cpu: 50m
          memory: 64Mi
        maxAllowed:
          cpu: 2000m
          memory: 2Gi
        controlledResources: ["cpu", "memory"]
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: nexora-worker-ai-vpa
  namespace: nexorafield
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexora-worker-ai
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: worker-ai
        minAllowed:
          cpu: 100m
          memory: 128Mi
        maxAllowed:
          cpu: 4000m
          memory: 4Gi
        controlledResources: ["cpu", "memory"]
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: nexora-worker-fin-vpa
  namespace: nexorafield
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexora-worker-financial
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: worker-financial
        minAllowed:
          cpu: 50m
          memory: 64Mi
        maxAllowed:
          cpu: 1000m
          memory: 1Gi
        controlledResources: ["cpu", "memory"]
