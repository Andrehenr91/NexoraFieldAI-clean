# ============================================================
# NexoraField AI — Canary & Blue/Green Deployment
# Fase 3: Kubernetes — Deploy sem indisponibilidade
# ============================================================

# ── Canary Deployment (20% do tráfego) ──────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-api-canary
  namespace: nexorafield
  labels:
    app: nexora-api
    track: canary
    version: canary
spec:
  replicas: 1  # 1 réplica = ~20% se api principal tem 4
  selector:
    matchLabels:
      app: nexora-api
      track: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nexora-api
        track: canary
        version: canary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: nexora-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [nexora-api]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: gcr.io/nexorafield/api:canary  # imagem do canary
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: nexora-config
            - secretRef:
                name: nexora-secrets
          env:
            - name: DEPLOYMENT_TRACK
              value: "canary"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
---
# ── Blue Environment (produção estável) ─────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-api-blue
  namespace: nexorafield
  labels:
    app: nexora-api-blue
    track: blue
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nexora-api-blue
  template:
    metadata:
      labels:
        app: nexora-api-blue
        track: blue
    spec:
      serviceAccountName: nexora-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: api
          image: gcr.io/nexorafield/api:stable
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: nexora-config
            - secretRef:
                name: nexora-secrets
          env:
            - name: DEPLOYMENT_TRACK
              value: "blue"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
---
# ── Green Environment (nova versão em espera) ────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-api-green
  namespace: nexorafield
  labels:
    app: nexora-api-green
    track: green
spec:
  replicas: 0  # inicia em 0; escala durante switch
  selector:
    matchLabels:
      app: nexora-api-green
  template:
    metadata:
      labels:
        app: nexora-api-green
        track: green
    spec:
      serviceAccountName: nexora-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: api
          image: gcr.io/nexorafield/api:next  # nova versão
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: nexora-config
            - secretRef:
                name: nexora-secrets
          env:
            - name: DEPLOYMENT_TRACK
              value: "green"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
---
# ── Service: Blue/Green Switch ───────────────────────────────
# Para trocar entre blue e green, altere o selector abaixo:
# selector:
#   app: nexora-api-blue   ← troque para nexora-api-green
apiVersion: v1
kind: Service
metadata:
  name: nexora-api-bluegreen
  namespace: nexorafield
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector:
    app: nexora-api-blue  # ← trocar para nexora-api-green no switch
  ports:
    - name: http
      port: 80
      targetPort: 5000
